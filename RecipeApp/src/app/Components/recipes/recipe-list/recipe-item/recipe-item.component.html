<a
  [routerLink]="[index()]"
  routerLinkActive="active"
  class="recipe-card glass-panel"
  [attr.aria-label]="recipe().name"
  role="listitem">
  
  <div class="recipe-card-image-wrapper">
    <img
      [src]="recipe().imagePath"
      [alt]="recipe().name"
      class="recipe-card-image">
    <div class="recipe-ingredients-badge">
      <span class="badge-count">{{ recipe().ingredients.length }}</span>
      <span class="badge-text" i18n="@@recipeCardBadgeIngs">Ings</span>
    </div>
  </div>

  <div class="recipe-card-content">
    <h4 class="recipe-card-title">{{ recipe().name }}</h4>
    <p class="recipe-card-desc">{{ recipe().description }}</p>
  </div>
</a>
