@if (recipe(); as r) {
  <article class="recipe-detail glass-panel">
    
    <div class="recipe-detail-hero">
      <img
        [src]="r.imagePath"
        [alt]="r.name"
        class="recipe-detail-image">
      <div class="recipe-detail-overlay"></div>
    </div>

    <div class="recipe-detail-body">
      
      <div class="recipe-detail-header">
        <h1 class="recipe-detail-title">{{ r.name }}</h1>
        
        <div class="dropdown-container" appDropdown>
          <button
            type="button"
            class="btn btn-primary dropdown-trigger"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Manage Recipe"
            i18n-aria-label="@@recipeDetailManageAriaLabel">
            <span i18n="@@recipeDetailManageButton">Actions</span>
            <span class="caret-select">▾</span>
          </button>
          <ul class="dropdown-menu-list glass-panel" role="menu">
            <li role="none">
              <a
                class="dropdown-item"
                role="menuitem"
                (click)="onAddToShoppingList()"
                i18n="@@recipeDetailToShoppingList">To Shopping List</a>
            </li>
            <li role="none">
              <a
                class="dropdown-item"
                role="menuitem"
                (click)="onEditedRecipe()"
                i18n="@@recipeDetailEdit">Edit</a>
            </li>
            <li role="none">
              <a
                class="dropdown-item danger"
                role="menuitem"
                (click)="onDeleteRecipe()"
                i18n="@@recipeDetailDelete">Delete</a>
            </li>
          </ul>
        </div>
      </div>

      <p class="recipe-detail-desc">{{ r.description }}</p>

      <section class="recipe-ingredients-section">
        <h3 class="ingredients-title" i18n="@@recipeDetailIngredientsTitle">Ingredients Required</h3>
        <ul class="ingredients-list" role="list" aria-label="Ingredients" i18n-aria-label="@@recipeDetailIngredientsAriaLabel">
          @for (ingredient of r.ingredients; track ingredient.name) {
            <li class="ingredient-row glass-panel" role="listitem">
              <span class="ingredient-name">{{ ingredient.name }}</span>
              <span class="ingredient-amount">{{ ingredient.amount }}</span>
            </li>
          }
        </ul>
      </section>

    </div>

  </article>
}
