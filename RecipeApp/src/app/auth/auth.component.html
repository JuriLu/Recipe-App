<main class="auth-wrapper" aria-label="Authentication" i18n-aria-label="@@authMainAriaLabel">
  <div class="auth-card glass-panel">
    
    <div class="auth-header">
      <img src="/assets/logo.png" alt="Recipe Book Logo" class="auth-logo">
      <h2 class="auth-title">
        {{ isLoginMode() ? 'Welcome Back' : 'Create Account' }}
      </h2>
      <p class="auth-subtitle" i18n="@@authCardSubtitle">
        {{ isLoginMode() ? 'Sign in to access your custom recipe collection' : 'Sign up to discover and save recipes' }}
      </p>
    </div>

    @if (error()) {
      <app-alert
        [message]="error()!"
        (close)="onHandleError()">
      </app-alert>
    }

    @if (isLoading()) {
      <div class="spinner-container" role="status" aria-label="Loading" i18n-aria-label="@@authLoadingAriaLabel">
        <app-loading-spinner></app-loading-spinner>
      </div>
    } @else {
      <form
        #authForm="ngForm"
        (ngSubmit)="onSubmit(authForm)"
        aria-label="Login or sign up form"
        i18n-aria-label="@@authFormAriaLabel"
        class="auth-form">

        <div class="form-group custom-input-group">
          <label for="email" i18n="@@authEmailLabel">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-control"
            ngModel
            name="email"
            required
            email
            placeholder="name@domain.com"
            autocomplete="email"
            aria-required="true"/>
        </div>

        <div class="form-group custom-input-group">
          <label for="password" i18n="@@authPasswordLabel">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            ngModel
            name="password"
            required
            minlength="6"
            placeholder="Min 6 characters"
            autocomplete="current-password"
            aria-required="true"/>
        </div>

        <div class="auth-actions">
          <button
            class="btn btn-primary btn-block btn-submit"
            type="submit"
            [disabled]="!authForm.valid"
            [attr.aria-label]="isLoginMode() ? 'Login to your account' : 'Create a new account'"
            i18n-aria-label="@@authSubmitAriaLabel">
            {{ isLoginMode() ? 'Login' : 'Sign Up' }}
          </button>
          
          <button
            class="btn btn-default btn-block btn-switch"
            type="button"
            (click)="onSwitchMode()"
            [attr.aria-label]="isLoginMode() ? 'Switch to Sign Up' : 'Switch to Login'"
            i18n-aria-label="@@authSwitchAriaLabel">
            {{ isLoginMode() ? 'Create an account' : 'Already have an account? Login' }}
          </button>
        </div>

      </form>
    }
  </div>
</main>
