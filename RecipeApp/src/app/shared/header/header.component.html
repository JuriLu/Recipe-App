<header class="main-header glass-panel">
  <div class="header-container">
    
    <a routerLink="/recipes" class="brand-link" aria-label="Recipe Book home" i18n-aria-label="@@headerBrandAriaLabel">
      <img src="/assets/logo.png" alt="Recipe Book Logo" class="brand-logo">
      <span class="brand-title" i18n="@@headerBrandTitle">Recipe Book</span>
    </a>

    <button
      type="button"
      class="nav-toggle"
      [attr.aria-expanded]="!collapsed()"
      aria-controls="nav-menu"
      aria-label="Toggle navigation"
      i18n-aria-label="@@headerToggleNavAriaLabel"
      (click)="collapsed.set(!collapsed())">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav
      id="nav-menu"
      class="nav-menu"
      [class.active]="!collapsed()"
      role="navigation">

      <ul class="nav-list" role="menubar">
        @if (isAuthenticated()) {
          <li role="none">
            <a
              routerLinkActive="active"
              routerLink="/recipes"
              class="nav-link"
              role="menuitem"
              i18n="@@headerRecipesLink">Recipes</a>
          </li>
          <li role="none">
            <a
              routerLinkActive="active"
              routerLink="/shopping-list"
              class="nav-link"
              role="menuitem"
              i18n="@@headerShoppingListLink">Shopping List</a>
          </li>
        } @else {
          <li role="none">
            <a
              routerLinkActive="active"
              routerLink="/recipes"
              class="nav-link"
              role="menuitem">
              <button
                class="btn btn-sm btn-primary"
                type="button"
                i18n="@@headerLoginButton">Log In</button>
            </a>
          </li>
        }
      </ul>

      @if (isAuthenticated()) {
        <div class="auth-menu">
          <a routerLink="/profile" class="profile-link-btn">
            <button
              class="btn btn-sm btn-success profile-trigger"
              type="button"
              aria-label="User Profile settings"
              i18n-aria-label="@@headerProfileMenuAria">
              <span class="profile-avatar-icon">👤</span>
              <span i18n="@@headerProfileButton">Profile</span>
            </button>
          </a>
          
          <button
            class="btn btn-sm btn-danger logout-btn"
            type="button"
            (click)="onLogout()"
            i18n="@@headerLogoutButton">Logout</button>
        </div>
      }
    </nav>
  </div>
</header>
